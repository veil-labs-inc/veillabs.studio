<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Veil Labs — We make games that linger.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&family=Monoton&display=swap" rel="stylesheet">
<style>
/* VEIL LABS — haunted phosphor CRT */
:root {
  --bg: #050806;
  --bg-2: #0a0f0c;
  --bg-3: #0f1612;
  --phos: #39ff7a;
  --phos-dim: #1a4a2a;
  --phos-ghost: #39ff7a22;
  --amber: #ffb020;
  --blood: #e23a4a;
  --bone: #d7e5d2;
  --bone-dim: #6a7a6c;
  --plastic: #2a4a35;
  --plastic-lt: #4ea36a;
  --plastic-dk: #0a1a10;
  --crt-intensity: 0.35;
  --scanline-opacity: 0.18;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--bone);
  font-family: 'VT323', 'Courier New', monospace;
  font-size: 20px;
  line-height: 1.35;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

body {
  background:
    radial-gradient(ellipse at 50% 0%, #0f1f16 0%, #050806 55%, #000 100%),
    var(--bg);
  min-height: 100vh;
}

/* ============ CRT overlay ============ */
.crt {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9998;
  mix-blend-mode: normal;
}
.crt::before {
  content: "";
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    rgba(0,0,0, var(--scanline-opacity)) 0px,
    rgba(0,0,0, var(--scanline-opacity)) 1px,
    transparent 1px, transparent 3px
  );
  opacity: var(--crt-intensity);
}
.crt::after {
  content: "";
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.75) 100%);
  opacity: calc(var(--crt-intensity) * 1.2);
}
.crt-flicker {
  position: fixed; inset: 0; pointer-events: none; z-index: 9999;
  background: rgba(57, 255, 122, 0.015);
  animation: flicker 7s infinite steps(60);
}
@keyframes flicker {
  0%, 97%, 100% { opacity: 0; }
  98% { opacity: 0.4; }
  98.5% { opacity: 0; }
  99% { opacity: 0.6; }
}

/* ============ Type ============ */
.font-pixel { font-family: 'Press Start 2P', monospace; letter-spacing: 0.02em; }
.font-mono  { font-family: 'VT323', monospace; }
.font-heavy { font-family: 'Monoton', 'Press Start 2P', monospace; letter-spacing: 0.02em; }

.phos { color: var(--phos); text-shadow: 0 0 6px rgba(57,255,122,0.6), 0 0 14px rgba(57,255,122,0.25); }
.phos-dim { color: var(--phos); text-shadow: 0 0 3px rgba(57,255,122,0.4); opacity: 0.8; }
.amber { color: var(--amber); text-shadow: 0 0 6px rgba(255,176,32,0.5); }
.bone { color: var(--bone); }
.blood { color: var(--blood); }

/* ============ Chrome ============ */
.hud-frame {
  border: 2px solid var(--phos-dim);
  background: rgba(10,15,12,0.6);
  position: relative;
}
.hud-frame::before {
  content: ""; position: absolute; inset: 4px;
  border: 1px solid rgba(57,255,122,0.15);
  pointer-events: none;
}

/* ============ Blinking cursor ============ */
.cursor::after {
  content: "▊";
  color: var(--phos);
  animation: blink 1s steps(2) infinite;
  margin-left: 2px;
}
@keyframes blink { 50% { opacity: 0; } }

/* ============ Buttons ============ */
.btn-retro {
  font-family: 'Press Start 2P', monospace;
  background: var(--bg-2);
  color: var(--phos);
  border: 2px solid var(--phos-dim);
  padding: 12px 18px;
  font-size: 11px;
  letter-spacing: 0.08em;
  cursor: pointer;
  position: relative;
  text-transform: uppercase;
  transition: all 0.08s;
}
.btn-retro:hover {
  background: var(--phos-dim);
  color: var(--phos);
  border-color: var(--phos);
  box-shadow: 0 0 0 2px var(--bg), 0 0 14px rgba(57,255,122,0.4);
}
.btn-retro:active { transform: translate(1px,1px); }

.btn-ghost {
  font-family: 'VT323', monospace;
  background: transparent;
  color: var(--bone);
  border: 1px solid var(--bone-dim);
  padding: 4px 10px;
  font-size: 16px;
  cursor: pointer;
  letter-spacing: 0.05em;
}
.btn-ghost:hover { border-color: var(--phos); color: var(--phos); }

/* ============ Animations ============ */
@keyframes scan-sweep {
  0% { transform: translateY(-100%); }
  100% { transform: translateY(500%); }
}
@keyframes boot-flash {
  0% { opacity: 0; }
  10% { opacity: 1; }
  100% { opacity: 0; }
}
@keyframes jitter {
  0%, 100% { transform: translate(0,0); }
  25% { transform: translate(-0.5px, 0.5px); }
  50% { transform: translate(0.5px, -0.5px); }
  75% { transform: translate(-0.5px, -0.5px); }
}
.jitter { animation: jitter 0.12s infinite; }

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
.float { animation: float 4s ease-in-out infinite; }

@keyframes ghost-shimmer {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 0.7; }
}

/* ============ 3D perspective helpers ============ */
.perspective-1000 { perspective: 1000px; }
.preserve-3d { transform-style: preserve-3d; }
.backface-hidden { backface-visibility: hidden; }

/* ============ Scrollbar ============ */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: var(--bg-2); }
::-webkit-scrollbar-thumb { background: var(--phos-dim); border: 1px solid var(--bg); }
::-webkit-scrollbar-thumb:hover { background: var(--phos); }

/* ============ Misc ============ */
.pixel-border {
  --sz: 3px;
  box-shadow:
    0 calc(var(--sz) * -1) 0 var(--phos-dim),
    0 var(--sz) 0 var(--phos-dim),
    calc(var(--sz) * -1) 0 0 var(--phos-dim),
    var(--sz) 0 0 var(--phos-dim);
}

.noise {
  position: absolute; inset: 0; pointer-events: none; opacity: 0.06;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='200' height='200' filter='url(%23n)' opacity='0.7'/></svg>");
}

.divider-line {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--phos-dim) 20%, var(--phos-dim) 80%, transparent);
}

.tape-label {
  background: var(--bone);
  color: var(--plastic-dk);
  font-family: 'Press Start 2P', monospace;
  padding: 2px 8px;
  font-size: 10px;
  letter-spacing: 0.1em;
  display: inline-block;
}

/* Hide during boot */
.hidden-during-boot { visibility: hidden; }

</style>
</head>
<body>
<div id="root"></div>
<div class="crt"></div>
<div class="crt-flicker"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" data-presets="react">
// 3D CSS Apparish Cartridge — N64-style chunky plastic
const { useState, useRef, useEffect } = React;

function Cartridge({ colorway = "ghost-green", size = 1, flippable = true, onInsert, tilt = true, label = "APPARISH", subtitle = "HAUNTED REALITY" }) {
  const [flipped, setFlipped] = useState(false);
  const [tilted, setTilted] = useState({ x: 0, y: 0 });
  const ref = useRef(null);

  const colorways = {
    "ghost-green": {
      body: "linear-gradient(145deg, #2a5a3a 0%, #1a3a25 50%, #0f2418 100%)",
      bodyEdge: "#4ea36a",
      shadow: "rgba(57,255,122,0.35)",
      plastic: "rgba(80, 180, 110, 0.55)",
      translucent: true,
    },
    "atomic-purple": {
      body: "linear-gradient(145deg, #3a2a5a 0%, #221640 100%)",
      bodyEdge: "#8a6ad6",
      shadow: "rgba(170,120,255,0.35)",
      plastic: "rgba(140, 100, 220, 0.55)",
      translucent: true,
    },
    "blood-red": {
      body: "linear-gradient(145deg, #5a1a1a 0%, #2a0a0a 100%)",
      bodyEdge: "#d63a3a",
      shadow: "rgba(220, 60, 60, 0.4)",
      plastic: "rgba(200, 40, 40, 0.6)",
      translucent: true,
    },
    "classic-gray": {
      body: "linear-gradient(145deg, #3a3a3a 0%, #1a1a1a 100%)",
      bodyEdge: "#888",
      shadow: "rgba(100,100,100,0.4)",
      plastic: "#2a2a2a",
      translucent: false,
    },
    "bone": {
      body: "linear-gradient(145deg, #d0d0c0 0%, #8a8a80 100%)",
      bodyEdge: "#f0f0e0",
      shadow: "rgba(220,220,200,0.3)",
      plastic: "#b0b0a0",
      translucent: false,
    }
  };
  const cw = colorways[colorway] || colorways["ghost-green"];

  // Mouse-tilt
  const handleMove = (e) => {
    if (!tilt || !ref.current || flipped) return;
    const r = ref.current.getBoundingClientRect();
    const px = (e.clientX - r.left) / r.width - 0.5;
    const py = (e.clientY - r.top) / r.height - 0.5;
    setTilted({ x: py * -18, y: px * 22 });
  };
  const handleLeave = () => setTilted({ x: 0, y: 0 });

  // SCALE
  const W = 240 * size;
  const H = 320 * size;
  const D = 32 * size; // depth

  return (
    <div
      style={{ perspective: `${1400 * size}px`, display: "inline-block", cursor: flippable ? "pointer" : "default" }}
      onMouseMove={handleMove}
      onMouseLeave={handleLeave}
      onClick={() => flippable && setFlipped(f => !f)}
    >
      <div
        ref={ref}
        style={{
          width: W, height: H,
          position: "relative",
          transformStyle: "preserve-3d",
          transform: `rotateX(${tilted.x}deg) rotateY(${tilted.y}deg)`,
          transition: "transform 0.55s cubic-bezier(.2,.8,.2,1)",
          filter: `drop-shadow(0 25px 30px ${cw.shadow})`,
        }}
      >
        {/* FRONT or BACK — render one at a time to avoid backface-visibility quirks */}
        {!flipped ? (
          <CartFace front cw={cw} W={W} H={H} D={D} label={label} subtitle={subtitle} />
        ) : (
          <CartFace back cw={cw} W={W} H={H} D={D} />
        )}
        {/* LEFT SIDE */}
        <div style={{
          position: "absolute",
          width: D, height: H,
          left: 0, top: 0,
          background: cw.bodyEdge,
          transform: `rotateY(-90deg) translateZ(0px) translateX(${-D/2}px)`,
          transformOrigin: "left center",
          boxShadow: "inset -4px 0 8px rgba(0,0,0,0.5)",
        }} />
        {/* RIGHT SIDE */}
        <div style={{
          position: "absolute",
          width: D, height: H,
          right: 0, top: 0,
          background: cw.bodyEdge,
          transform: `rotateY(90deg) translateZ(0px) translateX(${D/2}px)`,
          transformOrigin: "right center",
          boxShadow: "inset 4px 0 8px rgba(0,0,0,0.5)",
        }} />
        {/* TOP */}
        <div style={{
          position: "absolute",
          width: W, height: D,
          top: 0, left: 0,
          background: cw.bodyEdge,
          transform: `rotateX(90deg) translateZ(${D/2}px) translateY(${-D/2}px)`,
          transformOrigin: "top center",
          boxShadow: "inset 0 -4px 8px rgba(0,0,0,0.5)",
        }} />
        {/* BOTTOM (connector) */}
        <div style={{
          position: "absolute",
          width: W, height: D,
          bottom: 0, left: 0,
          background: "#1a1a1a",
          transform: `rotateX(-90deg) translateZ(${D/2}px) translateY(${D/2}px)`,
          transformOrigin: "bottom center",
          display: "flex", alignItems: "center", justifyContent: "space-around",
          padding: "0 12px",
        }}>
          {Array.from({ length: 12 }).map((_, i) => (
            <div key={i} style={{ width: 4, height: D * 0.55, background: "#d4a94a", boxShadow: "0 0 1px #000" }} />
          ))}
        </div>
      </div>
    </div>
  );
}

function CartFace({ front, back, cw, W, H, D, label, subtitle }) {
  // Each face: rotate first, THEN translate along its own local z forward.
  // Back rotated 180 + translateZ(D/2) lands at world -D/2 (truly on the back).
  const rotation = front ? "rotateY(0deg)" : "rotateY(180deg)";
  return (
    <div style={{
      position: "absolute", top: 0, left: 0, width: W, height: H,
      transform: `${rotation} translateZ(${D/2}px)`,
      backfaceVisibility: "hidden",
      background: cw.body,
      border: `2px solid ${cw.bodyEdge}`,
      borderRadius: "10px 10px 4px 4px",
      overflow: "hidden",
      boxShadow: cw.translucent
        ? `inset 0 0 80px ${cw.plastic}, inset 0 6px 0 rgba(255,255,255,0.15)`
        : `inset 0 6px 0 rgba(255,255,255,0.1), inset 0 -6px 0 rgba(0,0,0,0.3)`,
    }}>
      {/* ridged top */}
      <div style={{
        position: "absolute", top: 0, left: 0, right: 0, height: H * 0.12,
        background: `repeating-linear-gradient(90deg, ${cw.bodyEdge} 0 4px, transparent 4px 8px)`,
        opacity: 0.25,
      }} />
      {/* brand notch top */}
      <div style={{
        position: "absolute", top: 12, left: "50%", transform: "translateX(-50%)",
        fontFamily: "'Press Start 2P', monospace", fontSize: 8, letterSpacing: "0.3em",
        color: cw.translucent ? "rgba(215,229,210,0.55)" : "rgba(255,255,255,0.55)",
      }}>
        VEIL·LABS
      </div>

      {front ? <CartFront label={label} subtitle={subtitle} cw={cw} /> : <CartBack cw={cw} />}

      {/* screw wells */}
      <Screw x={12} y={12} />
      <Screw x={W - 22} y={12} />
      <Screw x={12} y={H - 22} />
      <Screw x={W - 22} y={H - 22} />

      {/* translucent highlight */}
      {cw.translucent && (
        <div style={{
          position: "absolute", top: 0, left: 0, width: "55%", height: "100%",
          background: "linear-gradient(120deg, rgba(255,255,255,0.14) 0%, transparent 45%)",
          pointerEvents: "none",
        }} />
      )}
    </div>
  );
}

function Screw({ x, y }) {
  return (
    <div style={{
      position: "absolute", left: x, top: y, width: 10, height: 10,
      borderRadius: "50%",
      background: "radial-gradient(circle at 35% 35%, #666 0%, #111 80%)",
      boxShadow: "inset 0 0 0 1px #000",
    }}>
      <div style={{
        position: "absolute", top: "50%", left: 1, right: 1, height: 1,
        background: "#000", transform: "translateY(-0.5px) rotate(-30deg)",
      }} />
    </div>
  );
}

function CartFront({ label, subtitle, cw }) {
  return (
    <div style={{
      position: "absolute", top: "16%", left: "10%", right: "10%", bottom: "8%",
      background: "#0a140e",
      border: "2px solid #1a3a25",
      borderRadius: 4,
      padding: 12,
      display: "flex", flexDirection: "column", justifyContent: "space-between",
      overflow: "hidden",
      boxShadow: "inset 0 0 30px rgba(0,0,0,0.8), inset 0 0 0 1px rgba(57,255,122,0.15)",
    }}>
      {/* label art — ghost */}
      <div style={{ flex: 1, position: "relative", display: "flex", alignItems: "center", justifyContent: "center" }}>
        <svg viewBox="0 0 100 100" style={{ width: "90%", height: "90%" }}>
          <defs>
            <radialGradient id="ghostGlow" cx="50%" cy="45%" r="50%">
              <stop offset="0%" stopColor="#39ff7a" stopOpacity="0.9"/>
              <stop offset="60%" stopColor="#39ff7a" stopOpacity="0.15"/>
              <stop offset="100%" stopColor="#39ff7a" stopOpacity="0"/>
            </radialGradient>
          </defs>
          <circle cx="50" cy="50" r="45" fill="url(#ghostGlow)" />
          {/* ghost silhouette */}
          <path
            d="M30 42 Q30 22 50 22 Q70 22 70 42 L70 74 Q68 70 64 74 Q60 78 56 74 Q52 70 48 74 Q44 78 40 74 Q36 70 32 74 L30 72 Z"
            fill="#0a140e"
            stroke="#39ff7a"
            strokeWidth="1.2"
          />
          {/* eyes */}
          <ellipse cx="42" cy="44" rx="2.5" ry="3.5" fill="#39ff7a" />
          <ellipse cx="58" cy="44" rx="2.5" ry="3.5" fill="#39ff7a" />
          {/* scanline on label */}
          <g opacity="0.3">
            {Array.from({length: 10}).map((_, i) => (
              <line key={i} x1="0" y1={i*10} x2="100" y2={i*10} stroke="#39ff7a" strokeWidth="0.3"/>
            ))}
          </g>
        </svg>
      </div>

      {/* title block */}
      <div style={{ textAlign: "center", borderTop: "1px solid #1a3a25", paddingTop: 8, padding: "8px 4px 0" }}>
        <div style={{
          fontFamily: "'Monoton', 'Press Start 2P', monospace",
          fontSize: 22, color: "#39ff7a", letterSpacing: "0.01em",
          textShadow: "0 0 8px rgba(57,255,122,0.7)",
          lineHeight: 1,
          whiteSpace: "nowrap",
        }}>
          {label}
        </div>
        <div style={{
          fontFamily: "'Press Start 2P', monospace",
          fontSize: 7, color: "#39ff7a", opacity: 0.7, letterSpacing: "0.3em", marginTop: 4,
        }}>
          {subtitle}
        </div>
      </div>
    </div>
  );
}

function CartBack({ cw }) {
  return (
    <div style={{
      position: "absolute", top: "14%", left: "10%", right: "10%", bottom: "8%",
      padding: 10,
      display: "flex", flexDirection: "column", gap: 6,
      color: cw.translucent ? "rgba(215,229,210,0.7)" : "rgba(255,255,255,0.75)",
      fontFamily: "'VT323', monospace",
      fontSize: 11,
    }}>
      <div style={{
        fontFamily: "'Press Start 2P', monospace", fontSize: 8, opacity: 0.85,
        borderBottom: "1px solid currentColor", paddingBottom: 4, letterSpacing: "0.2em",
      }}>
        VL-001 · APPARISH
      </div>
      <div style={{ lineHeight: 1.15 }}>
        A paranormal reality game. Players physically explore haunted places and uncover AI-generated spirits tied to local history and folklore.
      </div>
      <div style={{
        marginTop: "auto",
        border: "1px solid currentColor",
        padding: 5,
        fontSize: 9,
        lineHeight: 1.2,
      }}>
        <div style={{ fontFamily: "'Press Start 2P', monospace", fontSize: 6, marginBottom: 3, letterSpacing: "0.15em" }}>WARNING</div>
        Contains persistent characters who remember you. Neglect at your own risk.
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, marginTop: 2 }}>
        <span>© 2026 VEIL LABS</span>
        <span>MADE IN USA</span>
      </div>
    </div>
  );
}

window.Cartridge = Cartridge;

</script>
<script type="text/babel" data-presets="react">
// Boot sequence + CRT utilities
const { useState: useStateBoot, useEffect: useEffectBoot } = React;

function BootSequence({ onDone, skip }) {
  const [phase, setPhase] = useStateBoot(0); // 0 black, 1 warning, 2 VL logo, 3 done
  const [lineIdx, setLineIdx] = useStateBoot(0);

  useEffectBoot(() => {
    if (skip) { onDone?.(); return; }
    const timers = [];
    timers.push(setTimeout(() => setPhase(1), 350));
    timers.push(setTimeout(() => setPhase(2), 2600));
    timers.push(setTimeout(() => setPhase(3), 4600));
    timers.push(setTimeout(() => onDone?.(), 5200));
    return () => timers.forEach(clearTimeout);
  }, [skip]);

  useEffectBoot(() => {
    if (phase !== 1) return;
    const id = setInterval(() => setLineIdx(i => Math.min(i + 1, 7)), 180);
    return () => clearInterval(id);
  }, [phase]);

  if (skip || phase === 3) return null;

  return (
    <div style={{
      position: "fixed", inset: 0, background: "#000", zIndex: 9000,
      color: "var(--phos)",
      fontFamily: "'VT323', monospace",
      display: "flex", alignItems: "center", justifyContent: "center",
      overflow: "hidden",
    }}>
      {/* scanlines */}
      <div style={{
        position: "absolute", inset: 0,
        background: "repeating-linear-gradient(to bottom, rgba(0,0,0,0.45) 0 1px, transparent 1px 3px)",
        pointerEvents: "none", zIndex: 2,
      }} />
      {/* vignette */}
      <div style={{
        position: "absolute", inset: 0,
        background: "radial-gradient(ellipse at center, transparent 40%, #000 100%)",
        pointerEvents: "none", zIndex: 2,
      }} />

      {phase === 0 && (
        <div style={{ color: "var(--phos)", fontSize: 40, letterSpacing: "0.3em" }}>
          <span style={{animation: "ghost-shimmer 0.4s infinite"}}>● ● ●</span>
        </div>
      )}

      {phase === 1 && (
        <div style={{ width: "min(720px, 85vw)", padding: 20 }}>
          <div style={{
            fontFamily: "'Press Start 2P', monospace", fontSize: 14, letterSpacing: "0.2em",
            color: "#ffb020", textShadow: "0 0 8px rgba(255,176,32,0.6)",
            marginBottom: 18,
          }}>▲ SYSTEM BOOT — V.001</div>
          {[
            "> POWER ON ................................. [OK]",
            "> MEMORY CHECK ......................... 64MB OK",
            "> CARTRIDGE DETECTED ............ VL-001",
            "> READING ROM ....................... APPARISH",
            "> INIT NEURAL ENGINE ................... [OK]",
            "> LOADING HAUNTED DATABASE .... [OK]",

          onBlur={(e) => e.target.style.borderColor = "var(--phos-dim)"}
        />
      )}
    </label>
  );
}

function QuickFact({ label, value }) {
  return (
    <div className="hud-frame" style={{ padding: 16 }}>
      <div className="font-mono" style={{ color: "var(--bone-dim)", fontSize: 13, letterSpacing: "0.2em" }}>{label}</div>
      <div className="font-pixel" style={{ fontSize: 12, color: "var(--phos)", letterSpacing: "0.1em", marginTop: 8, textShadow: "0 0 4px rgba(57,255,122,0.5)" }}>
        {value}
      </div>
    </div>
  );
}

/* =========================================================
   FOOTER
========================================================= */
function Footer() {
  return (
    <footer style={{
      marginTop: 40, padding: "30px 24px 40px",
      borderTop: "2px solid var(--phos-dim)",
      background: "#050806",
    }}>
      <div style={{ maxWidth: 1280, margin: "0 auto", display: "grid", gridTemplateColumns: "auto 1fr auto", gap: 20, alignItems: "center" }}>
        <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
          <VeilLogo size={30} />
          <div>
            <div className="font-pixel" style={{ fontSize: 12, color: "var(--phos)", letterSpacing: "0.15em", textShadow: "0 0 5px rgba(57,255,122,0.5)" }}>
              VEIL LABS
            </div>
            <div className="font-mono" style={{ fontSize: 13, color: "var(--bone-dim)", letterSpacing: "0.2em", marginTop: 2 }}>
              WE MAKE GAMES THAT HAUNT.
            </div>
          </div>
        </div>
        <div className="font-mono" style={{ fontSize: 14, color: "var(--bone-dim)", textAlign: "center", letterSpacing: "0.15em" }}>
          © 2026 VEIL LABS INC · VL-ROM CATALOGUE · LICENSED BY THE OTHER SIDE
        </div>
        <div className="font-mono" style={{ fontSize: 14, color: "var(--phos)", letterSpacing: "0.2em", textAlign: "right" }}>
          <span className="cursor">▊</span> ONLINE
        </div>
      </div>
    </footer>
  );
}

/* =========================================================
   TWEAKS PANEL
========================================================= */
function TweaksPanel({ state, setState, visible }) {
  if (!visible) return null;
  const colorways = ["ghost-green", "atomic-purple", "blood-red", "classic-gray", "bone"];
  return (
    <div style={{
      position: "fixed", bottom: 16, right: 16, zIndex: 10000,
      width: 280, background: "#050806",
      border: "2px solid var(--phos)",
      boxShadow: "0 0 20px rgba(57,255,122,0.3)",
      padding: 16,
      fontFamily: "'VT323', monospace",
    }}>
      <div className="font-pixel" style={{ fontSize: 11, color: "var(--phos)", letterSpacing: "0.2em", marginBottom: 14, textShadow: "0 0 5px rgba(57,255,122,0.5)", borderBottom: "1px dashed var(--phos-dim)", paddingBottom: 10 }}>
        ▣ TWEAKS
      </div>

      <TweakGroup label="CARTRIDGE COLORWAY">
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          {colorways.map((c) => (
            <button key={c}
              onClick={() => setState({ ...state, colorway: c })}
              className="btn-ghost"
              style={{
                fontSize: 11, padding: "4px 8px",
                borderColor: state.colorway === c ? "var(--phos)" : "var(--bone-dim)",
                color: state.colorway === c ? "var(--phos)" : "var(--bone)",
              }}
            >{c}</button>
          ))}
        </div>
      </TweakGroup>

      <TweakGroup label="CRT INTENSITY">
        <input type="range" min="0" max="1" step="0.05" value={state.crtIntensity}
          onChange={(e) => setState({ ...state, crtIntensity: parseFloat(e.target.value) })}
          style={{ width: "100%", accentColor: "var(--phos)" }}
        />
        <div className="font-mono" style={{ fontSize: 13, color: "var(--bone-dim)", letterSpacing: "0.2em" }}>
          {Math.round(state.crtIntensity * 100)}%
        </div>
      </TweakGroup>

      <TweakGroup label="SCANLINES">
        <input type="range" min="0" max="0.6" step="0.02" value={state.scanlineOpacity}
          onChange={(e) => setState({ ...state, scanlineOpacity: parseFloat(e.target.value) })}
          style={{ width: "100%", accentColor: "var(--phos)" }}
        />
      </TweakGroup>

      <TweakGroup label="PHOSPHOR HUE">
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          {[
            ["GREEN", "#39ff7a", "#1a4a2a"],
            ["AMBER", "#ffb020", "#5a3e0a"],
            ["BLUE",  "#5ac8ff", "#1a3a55"],
            ["RED",   "#ff5a6a", "#5a1a22"],
          ].map(([name, hex, dim]) => (
            <button key={name}
              onClick={() => setState({ ...state, phosphor: hex, phosphorDim: dim })}
              className="btn-ghost"
              style={{
                fontSize: 11, padding: "4px 8px",
                borderColor: state.phosphor === hex ? hex : "var(--bone-dim)",
                color: state.phosphor === hex ? hex : "var(--bone)",
              }}
            >{name}</button>
          ))}
        </div>
      </TweakGroup>

      <TweakGroup label="BOOT SEQUENCE">
        <button className="btn-ghost" style={{ fontSize: 11 }}
          onClick={() => setState({ ...state, replayBoot: (state.replayBoot || 0) + 1, bootSkip: false })}
        >▶ REPLAY BOOT</button>
      </TweakGroup>

      <div className="font-mono" style={{ fontSize: 11, color: "var(--bone-dim)", letterSpacing: "0.15em", marginTop: 10, borderTop: "1px dashed var(--phos-dim)", paddingTop: 8 }}>
        changes saved automatically
      </div>
    </div>
  );
}

function TweakGroup({ label, children }) {
  return (
    <div style={{ marginBottom: 14 }}>
      <div className="font-pixel" style={{ fontSize: 8, color: "var(--bone-dim)", letterSpacing: "0.25em", marginBottom: 8 }}>
        ▸ {label}
      </div>
      {children}
    </div>
  );
}

window.PressPage = PressPage;
window.Footer = Footer;
window.TweaksPanel = TweaksPanel;

</script>
<script type="text/babel" data-presets="react">
const { useState: useStateMain, useEffect: useEffectMain } = React;
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "colorway": "ghost-green",
  "crtIntensity": 0.35,
  "scanlineOpacity": 0.18,
  "phosphor": "#39ff7a",
  "phosphorDim": "#1a4a2a"
}/*EDITMODE-END*/;
function App(){
  const [booted,setBooted]=useStateMain(()=>sessionStorage.getItem("vl-booted")==="1");
  const [page,setPage]=useStateMain(()=>localStorage.getItem("vl-page")||"home");
  const [tweaksVisible,setTweaksVisible]=useStateMain(false);
  const [state,setState]=useStateMain(()=>{try{return {...TWEAK_DEFAULTS,...JSON.parse(localStorage.getItem("vl-tweaks")||"{}")};}catch{return TWEAK_DEFAULTS;}});
  const [bootKey,setBootKey]=useStateMain(0);
  useEffectMain(()=>{localStorage.setItem("vl-page",page);window.scrollTo(0,0);},[page]);
  useEffectMain(()=>{localStorage.setItem("vl-tweaks",JSON.stringify(state));},[state]);
  useEffectMain(()=>{document.documentElement.style.setProperty("--crt-intensity",state.crtIntensity);document.documentElement.style.setProperty("--scanline-opacity",state.scanlineOpacity);document.documentElement.style.setProperty("--phos",state.phosphor);document.documentElement.style.setProperty("--phos-dim",state.phosphorDim);},[state.crtIntensity,state.scanlineOpacity,state.phosphor,state.phosphorDim]);
  useEffectMain(()=>{if(state.replayBoot&&state.replayBoot!==bootKey){setBooted(false);setBootKey(state.replayBoot);sessionStorage.removeItem("vl-booted");}},[state.replayBoot]);
  useEffectMain(()=>{const onMessage=(e)=>{if(!e.data||typeof e.data!=="object")return;if(e.data.type==="__activate_edit_mode")setTweaksVisible(true);if(e.data.type==="__deactivate_edit_mode")setTweaksVisible(false);};window.addEventListener("message",onMessage);window.parent.postMessage({type:"__edit_mode_available"},"*");return()=>window.removeEventListener("message",onMessage);},[]);
  useEffectMain(()=>{window.parent.postMessage({type:"__edit_mode_set_keys",edits:{colorway:state.colorway,crtIntensity:state.crtIntensity,scanlineOpacity:state.scanlineOpacity,phosphor:state.phosphor,phosphorDim:state.phosphorDim}},"*");},[state.colorway,state.crtIntensity,state.scanlineOpacity,state.phosphor,state.phosphorDim]);
  const doneBoot=()=>{setBooted(true);sessionStorage.setItem("vl-booted","1");};
  const Page={home:HomePage,cartridges:CartridgesPage,apparish:ApparishPage,press:PressPage}[page]||HomePage;
  return (<div>{!booted&&<BootSequence key={bootKey} onDone={doneBoot}/>}<div style={{visibility:booted?"visible":"hidden"}}><Nav page={page} setPage={setPage}/><Page setPage={setPage} colorway={state.colorway}/><Footer/></div><TweaksPanel state={state} setState={setState} visible={tweaksVisible}/></div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
